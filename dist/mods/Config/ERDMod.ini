; ERDMod 配置文件
; 说明：
; 1. true = 开启，false = 关闭
; 2. 以 ; 开头的行是注释，不会被插件读取
; 3. 持续功能可以在游戏内菜单里反复开关
; 4. 一次性动作执行后通常不会自动回滚，请先备份存档
; 5. 建议只在离线环境测试

[General]
; 是否创建调试控制台窗口
create_console=false

; 是否把日志写到 Logs/ERDMod.log
enable_file_log=true

; 插件加载时是否弹出提示框
show_message_box=false

; 提示框显示的文字
message_box_text=ERDMod loaded.

[CharacterFlags]
; 不死
; 对应 CT: NoDead
no_dead=false

; 无伤
; 对应 CT: NoDamage
no_damage=false

; 无限 FP / 不耗蓝
; 对应 CT: NoFPConsumption
infinite_fp=false

; 道具不消耗
; 对应 CT: NoGoodsConsume
infinite_items=false

; 不耗精力
; 对应 CT: NoStaminaConsumption
no_stamina_consumption=false

[WorldUnlocks]
; 解锁全部地图
; 对应 CT: Unlock all Maps
unlock_all_maps=false

; 解锁全部食谱
; 对应 CT: Unlock all Cookbooks
unlock_all_cookbooks=false

; 解锁全部砥石刀
; 对应 CT: Unlock all Whetblades
unlock_all_whetblades=false

; 解锁全部赐福
; 对应 CT: Unlock all Graces
unlock_all_graces=false

; 解锁全部召唤池
; 对应 CT: Unlock all Summoning Pools
unlock_all_summoning_pools=false

; 解锁全部斗技场
; 对应 CT: Unlock all Colosseums
unlock_all_colosseums=false

; 解锁全部动作
; 对应 CT: Unlock All Gestures
unlock_all_gestures=false

[ParamPatches]
; 更快复活
; 对应 CT: Faster respawn
faster_respawn=false

; 未清小地牢强制传出
; 对应 CT: Warp out of uncleared mini-dungeons
warp_out_of_uncleared_minidungeons=false

; 商店免费购买
; 对应 CT: 免费购买 / shops_free
; 会把 ShopLineupParam 的价格字段和相关 sellValue 改为 0
free_purchase=false

; 制作不消耗材料
; 对应 CT: 锻造制作、升级不需要材料 里的 craftitem + free_craft_mat
; 只影响制作道具，不会改动强化材料逻辑
no_crafting_material_cost=false

; 强化不消耗材料
; 对应 CT: Upgrades Need No Materials
no_upgrade_material_cost=false

; 魔法没有使用需求
; 对应 CT: 魔法没有使用需求
; 会把全部魔法的智力、信仰和感应需求改为 0
no_magic_requirements=false

; 所有魔法只占一个栏位
; 对应 CT: 魔法没有使用需求 + 所有魔法只占一个栏位
; 会把全部魔法的栏位需求强制改成单栏位
all_magic_one_slot=false

; 装备无重量
; 对应 CT: 装备无重量
; 这是代码补丁型功能，会直接把装备重量计算结果清零
weightless_equipment=false

; 自定义 FOV
; 对应 CT: Custom FOV
custom_fov_enabled=false
custom_fov_value=60

; 自定义镜头距离
; 对应 CT: Custom Camera Distance
custom_camera_distance_enabled=false
custom_camera_distance_value=8

; 随处骑马
; 对应 CT: 随处骑马
; 这是代码补丁型功能，解除大部分区域的灵马呼唤限制
mount_anywhere=false

; 随处召唤骨灰
; 对应 CT: 随处召唤骨灰
; 同时包含扩大骨灰召唤范围的子补丁
spirit_ashes_anywhere=false

; 掉宝率倍率 x10
; 对应 CT: Item discovery x10
item_discovery_multiplier=1

; 常亮提灯
; 对应 CT: Permanent Lantern Toggle
permanent_lantern=false

; 头盔隐藏
; 对应 CT: Invisible helmets (re-equip!)
invisible_helmets=false

[Movement]
; NoClip
; 对应 CT: NoClip/Freecam -> Activate NoClip
no_clip_enabled=false

; FreeCam
; 对应 CT: NoClip/Freecam -> Activate Freecam
freecam_enabled=false

; No Fall Camera
; 对应 CT: No Fall Camera
no_fall_camera=false

; Shared movement speed for NoClip / FreeCam
movement_speed=1.0

[GameActions]
; 开始下一周目
; 对应 CT: Start Next Cycle (NG+)
; 这是危险动作，建议只通过游戏内按钮手动触发
start_next_cycle=false

[PendingActions]
; 以下动作会被记录。下次检测到角色已进档后，会自动执行一次。
give_runes_requested=false
custom_item_give_requested=false
mass_item_gib_request_id=0
add_flask_charge_requested=false
set_flask_level_requested=false
debug_event_flag_write_requested=false
teleport_player_to_input_coords_requested=false
character_apply_requested=false
resource_apply_requested=false
equip_apply_requested=false
equip_unequip_requested=false
magic_attune_requested=false
magic_remove_requested=false
gesture_apply_requested=false

[Resources]
; 发放卢恩的默认数量
; 对应 CT: Give Runes
give_runes_amount=100000
custom_item_id=1073741824
custom_item_quantity=1
custom_item_reinforce_level=0
custom_item_upgrade_value=0
custom_item_gem_id=-1

; 增加圣杯瓶充能时的默认类型
; 0 = 红露滴圣杯瓶，1 = 蓝露滴圣杯瓶
; 对应 CT: Add charge to flask
add_flask_charge_type=0

; 圣杯瓶强化等级默认值
; 范围 0-12，对应游戏里的 +0 到 +12
; 对应 CT: Set flask level
set_flask_level_value=12

[Character]
character_level=1
character_vigor=10
character_mind=10
character_endurance=10
character_strength=10
character_dexterity=10
character_intelligence=10
character_faith=10
character_arcane=10
edit_hp=0
edit_mp=0
edit_sp=0

[Equipment]
equip_slot=1
equip_item_id=0

[Magic]
magic_slot=0
magic_item_id=0

[Gestures]
gesture_slot=0
gesture_item_id=0

[Debug]
; Event Flag 调试默认 ID
; 对应 CT: Event Flags by ID
debug_event_flag_id=0

; Event Flag 写入时的默认目标状态
; true = ON, false = OFF
debug_event_flag_desired_state=false
